---
- name: Deploy application with Docker Compose
  hosts: servers
  become: true
  gather_facts: false

  vars:
    deploy_dir: /home/ubuntu/deploy

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy deploy folder to target host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../deploy/"
        dest: "{{ deploy_dir }}/"
        owner: ubuntu
        group: ubuntu
        mode: preserve

    - name: Pull Docker image
      ansible.builtin.command: "docker pull {{ image_full }}"
      changed_when: true

    - name: Tag image as latest
      ansible.builtin.command: "docker tag {{ image_full }} {{ image_name }}:latest"
      changed_when: true

    - name: Restart services with Docker Compose
      ansible.builtin.shell: |
        docker compose down || true
        docker compose up -d
      args:
        chdir: "{{ deploy_dir }}"

    - name: Show running containers
      ansible.builtin.command: docker ps
      changed_when: false
