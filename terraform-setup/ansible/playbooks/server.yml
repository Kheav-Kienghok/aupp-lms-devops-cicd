---
- name: Configure Jenkins server
  hosts: jenkins
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for cloud-init to finish on Jenkins
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Refresh apt cache on Jenkins
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  tasks:
    - name: Install Jenkins prerequisites
      ansible.builtin.apt:
        name:
          - ansible
          - curl
          - fontconfig
          - gnupg
          - openjdk-21-jre
          - python3
          - python3-pip
          - python3-venv
          - unzip
          - wget
          - python3-apt
          - docker.io
        state: present

    - name: Install RedCoffee in dedicated virtual environment
      ansible.builtin.pip:
        name: redcoffee
        virtualenv: /opt/redcoffee-venv
        virtualenv_command: python3 -m venv
        state: latest

    - name: Expose redcoffee binary globally for Jenkins jobs
      ansible.builtin.file:
        src: /opt/redcoffee-venv/bin/redcoffee
        dest: /usr/local/bin/redcoffee
        state: link
        force: true

    - name: Download Trivy apt signing key
      ansible.builtin.get_url:
        url: https://aquasecurity.github.io/trivy-repo/deb/public.key
        dest: /tmp/trivy-public.key
        mode: "0644"

    - name: Convert Trivy signing key to keyring format
      ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/trivy.gpg /tmp/trivy-public.key
      args:
        creates: /usr/share/keyrings/trivy.gpg

    - name: Add Trivy apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main"
        filename: trivy
        state: present

    - name: Install Trivy
      ansible.builtin.apt:
        name: trivy
        state: present
        update_cache: true

    - name: Add Jenkins apt key
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: "0644"

    - name: Add Jenkins apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        filename: jenkins
        state: present

    - name: Install Jenkins
      ansible.builtin.apt:
        name: jenkins
        state: present
        update_cache: true

    - name: Append Jenkins CSP override
      ansible.builtin.lineinfile:
        path: /etc/default/jenkins
        line: 'JAVA_ARGS="$JAVA_ARGS -Dhudson.model.DirectoryBrowserSupport.CSP="""'
        insertafter: EOF
        create: yes
      notify: Restart Jenkins

    - name: Enable and start Jenkins
      ansible.builtin.service:
        name: jenkins
        state: started
        enabled: true

    - name: Download Terraform 1.14.3 archive
      ansible.builtin.get_url:
        url: https://releases.hashicorp.com/terraform/1.14.3/terraform_1.14.3_linux_amd64.zip
        dest: /tmp/terraform_1.14.3_linux_amd64.zip
        mode: "0644"

    - name: Install Terraform 1.14.3
      ansible.builtin.unarchive:
        src: /tmp/terraform_1.14.3_linux_amd64.zip
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"

    - name: Remove Terraform archive after installation
      ansible.builtin.file:
        path: /tmp/terraform_1.14.3_linux_amd64.zip
        state: absent

    - name: Download AWS CLI v2 archive
      ansible.builtin.get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: "0644"

    - name: Extract AWS CLI installer
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true

    - name: Install AWS CLI v2
      ansible.builtin.command: /tmp/aws/install
      args:
        creates: /usr/local/bin/aws

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Allow Docker socket access for Jenkins automation
      ansible.builtin.file:
        path: /var/run/docker.sock
        mode: "0666"

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Add jenkins user to docker group
      ansible.builtin.user:
        name: jenkins
        groups: docker
        append: true

    - name: Ensure Jenkins SSH directory exists
      ansible.builtin.file:
        path: /var/lib/jenkins/.ssh
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0700"

    - name: Generate SSH key pair for Jenkins
      ansible.builtin.openssh_keypair:
        path: /var/lib/jenkins/.ssh/id_rsa
        type: rsa
        size: 4096
        owner: jenkins
        group: jenkins
        mode: "0600"
        force: false

    - name: Ensure Jenkins public SSH key is readable
      ansible.builtin.file:
        path: /var/lib/jenkins/.ssh/id_rsa.pub
        owner: jenkins
        group: jenkins
        mode: "0644"

    - name: Check Terraform version
      ansible.builtin.command: terraform --version
      changed_when: false

    - name: Check AWS CLI version
      ansible.builtin.command: aws --version
      changed_when: false

    - name: Check Ansible version
      ansible.builtin.command: ansible-playbook --version
      changed_when: false

    - name: Wait for Jenkins to finish starting
      ansible.builtin.uri:
        url: http://127.0.0.1:8080/login
        status_code: [200, 403]
      register: jenkins_ready
      retries: 30
      delay: 10
      until: jenkins_ready.status in [200, 403]

    - name: Read Jenkins initial admin password
      ansible.builtin.command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_initial_password
      changed_when: false
      no_log: true

    - name: Store Jenkins initial admin password locally
      ansible.builtin.copy:
        content: "{{ jenkins_initial_password.stdout }}\n"
        dest: "./jenkins-initial-admin-password.txt"
        mode: "0600"
      delegate_to: localhost
      run_once: true
      no_log: true

  handlers:
    - name: Restart Jenkins
      ansible.builtin.service:
        name: jenkins
        state: restarted

- name: Configure SonarQube server
  hosts: sonarqube
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for cloud-init to finish on SonarQube
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Refresh apt cache on SonarQube
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade installed packages on SonarQube
      ansible.builtin.apt:
        upgrade: dist

    - name: Set vm.max_map_count for SonarQube
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        regexp: "^vm.max_map_count="
        line: "vm.max_map_count=262144"

    - name: Apply vm.max_map_count immediately
      ansible.builtin.command: sysctl -w vm.max_map_count=262144
      changed_when: false

  tasks:
    - name: Install Docker from apt
      ansible.builtin.apt:
        name:
          - docker.io
          - python3-apt
        state: present

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add the SSH user to the docker group
      ansible.builtin.user:
        name: "{{ ansible_facts['user_id'] }}"
        groups: docker
        append: true

    - name: Pull SonarQube image
      ansible.builtin.command: docker pull sonarqube:lts-community
      register: sonarqube_pull
      changed_when: "'Image is up to date' not in sonarqube_pull.stdout"

    - name: Check whether SonarQube container exists
      ansible.builtin.command: docker inspect sonarqube
      register: sonarqube_container
      failed_when: false
      changed_when: false

    - name: Run SonarQube container
      ansible.builtin.command: >
        docker run -d
        --name sonarqube
        --restart unless-stopped
        -p 9000:9000
        -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
        --ulimit nofile=131072:131072
        --ulimit nproc=8192:8192
        -v sonarqube_data:/opt/sonarqube/data
        -v sonarqube_extensions:/opt/sonarqube/extensions
        -v sonarqube_logs:/opt/sonarqube/logs
        sonarqube:lts-community
      when: sonarqube_container.rc != 0
